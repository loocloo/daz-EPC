<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EPC Company</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>EPC Company</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#quote">Get a Quote</a>
    <a href="book.html">Book Appointment</a>
  </nav>
</header>

<!-- HOME SECTION -->
<section id="home">
  <h2>Welcome</h2>
  <p>Professional EPC services. Get a quote or book an appointment.</p>
</section>

<!-- QUOTE SECTION -->
<section id="quote">
  <h2>Request a Quote</h2>

  <form action="https://formspree.io/f/yourformid" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="details" placeholder="Project details..." required></textarea>
    <button type="submit">Send Quote Request</button>
  </form>
</section>

<!-- BOOKING CALL-TO-ACTION -->
<section id="booking-cta">
  <h2>Book an Appointment</h2>
  <p>Choose a time that suits you.</p>

  <a href="book.html">
    <button>Go to Booking Page</button>
  </a>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 EPC Company</p>
</footer>

</body>
</html>
